name: Publish Javadoc

on:
  push:
    branches: [ main ]
    paths:
      - 'src/main/java/**'
      - 'jnexus-core/src/main/java/**'
      - 'pom.xml'
      - 'jnexus-core/pom.xml'
      - '.github/workflows/javadoc.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-javadoc:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-javadoc-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-javadoc-
            ${{ runner.os }}-maven-

      - name: Generate jnexus-core Javadoc
        working-directory: jnexus-core
        run: mvn javadoc:javadoc -B -q

      - name: Generate Desktop Javadoc
        run: mvn javadoc:javadoc -B -q -DskipTests

      - name: Prepare Javadoc site
        run: |
          mkdir -p javadoc-site/core
          mkdir -p javadoc-site/desktop

          # Copy generated Javadoc
          cp -r jnexus-core/target/site/apidocs/* javadoc-site/core/
          cp -r target/site/apidocs/* javadoc-site/desktop/

          # Create index page
          cat > javadoc-site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>JNexus API Documentation</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      max-width: 800px;
                      margin: 60px auto;
                      padding: 0 20px;
                      color: #333;
                      line-height: 1.6;
                  }
                  h1 { border-bottom: 2px solid #2563eb; padding-bottom: 10px; }
                  h2 { color: #1e40af; margin-top: 30px; }
                  a { color: #2563eb; text-decoration: none; }
                  a:hover { text-decoration: underline; }
                  .module {
                      border: 1px solid #e5e7eb;
                      border-radius: 8px;
                      padding: 20px;
                      margin: 15px 0;
                  }
                  .module h3 { margin-top: 0; }
                  .badge {
                      display: inline-block;
                      padding: 2px 8px;
                      border-radius: 4px;
                      font-size: 12px;
                      font-weight: 600;
                  }
                  .badge-core { background: #dbeafe; color: #1e40af; }
                  .badge-desktop { background: #f3e8ff; color: #6b21a8; }
                  code { background: #f3f4f6; padding: 2px 6px; border-radius: 3px; font-size: 14px; }
                  footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #e5e7eb; color: #6b7280; font-size: 14px; }
              </style>
          </head>
          <body>
              <h1>JNexus API Documentation</h1>
              <p>Javadoc API reference for the JNexus project -- a cross-platform tool for managing Sonatype Nexus repositories.</p>

              <h2>Modules</h2>

              <div class="module">
                  <h3><a href="core/">jnexus-core</a> <span class="badge badge-core">Java 17</span></h3>
                  <p>Shared business logic, data models, and platform abstractions used by all JNexus implementations (desktop and Android).</p>
                  <p>Key classes: <code>NexusService</code>, <code>NexusHttpClient</code>, <code>Credentials</code>, <code>SearchCriteria</code>, <code>RepoRecord</code>, <code>ComponentMetadata</code>, <code>RepositoryStats</code></p>
              </div>

              <div class="module">
                  <h3><a href="desktop/">Desktop</a> <span class="badge badge-desktop">Java 21</span></h3>
                  <p>Desktop application classes including CLI (Picocli), Swing GUI, AWT GUI, Terminal UI, and the <code>java.net.http</code>-based Nexus client.</p>
                  <p>Key classes: <code>NexusClient</code>, <code>NexusSwing</code>, <code>NexusAWT</code>, <code>NexusUI</code>, <code>Nexus</code> (CLI)</p>
              </div>

              <footer>
                  <p>Generated automatically from the <code>main</code> branch. Source: <a href="https://github.com/FlossWare/nexus-java">github.com/FlossWare/nexus-java</a></p>
              </footer>
          </body>
          </html>
          HTMLEOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./javadoc-site
          destination_dir: javadoc
          commit_message: 'docs: update Javadoc API documentation'

name: Deploy to Google Play

on:
  release:
    types: [published]

jobs:
  deploy-google-play:
    name: Deploy to Google Play Store
    runs-on: ubuntu-latest
    if: "!github.event.release.prerelease"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get release version
        id: release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Check for Play Store credentials
        id: check_creds
        run: |
          if [ -z "${{ secrets.PLAY_STORE_JSON_KEY }}" ]; then
            echo "has_creds=false" >> $GITHUB_OUTPUT
            echo "::notice::PLAY_STORE_JSON_KEY not configured. Skipping Google Play deployment."
          else
            echo "has_creds=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 21
        if: steps.check_creds.outputs.has_creds == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        if: steps.check_creds.outputs.has_creds == 'true'
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Keystore
        if: steps.check_creds.outputs.has_creds == 'true' && env.ANDROID_SIGNING_KEY != ''
        run: |
          echo "${{ secrets.ANDROID_SIGNING_KEY }}" | base64 --decode > jnexus-android/jnexus.keystore
        env:
          ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}

      - name: Build Release AAB
        if: steps.check_creds.outputs.has_creds == 'true'
        run: |
          gradle :jnexus-core:build
          gradle :jnexus-android:bundleRelease
        env:
          ANDROID_KEYSTORE_FILE: jnexus.keystore
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Install Fastlane
        if: steps.check_creds.outputs.has_creds == 'true'
        run: |
          sudo gem install fastlane -NV

      - name: Write Play Store JSON key
        if: steps.check_creds.outputs.has_creds == 'true'
        run: |
          echo '${{ secrets.PLAY_STORE_JSON_KEY }}' > jnexus-android/play-store-key.json

      - name: Deploy to Google Play (Internal track)
        if: steps.check_creds.outputs.has_creds == 'true'
        working-directory: jnexus-android
        run: |
          fastlane supply \
            --aab build/outputs/bundle/release/jnexus-android-release.aab \
            --json_key play-store-key.json \
            --package_name org.flossware.jnexus.android \
            --track internal \
            --skip_upload_metadata \
            --skip_upload_images \
            --skip_upload_screenshots
        continue-on-error: true

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f jnexus-android/play-store-key.json
          rm -f jnexus-android/jnexus.keystore

      - name: Publish summary
        if: always()
        run: |
          echo "## Google Play Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_creds.outputs.has_creds }}" == "true" ]; then
            echo "**Version:** ${{ steps.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
            echo "**Track:** Internal (promote to production manually)" >> $GITHUB_STEP_SUMMARY
          else
            echo "Skipped: PLAY_STORE_JSON_KEY secret not configured." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Setup Instructions" >> $GITHUB_STEP_SUMMARY
            echo "1. Create a Google Play Developer account (99 USD one-time)" >> $GITHUB_STEP_SUMMARY
            echo "2. Create a service account in Google Cloud Console" >> $GITHUB_STEP_SUMMARY
            echo "3. Grant the service account access in Google Play Console" >> $GITHUB_STEP_SUMMARY
            echo "4. Download the JSON key and add as \`PLAY_STORE_JSON_KEY\` secret" >> $GITHUB_STEP_SUMMARY
          fi

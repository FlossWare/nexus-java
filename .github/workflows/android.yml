name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build jnexus-core
        run: gradle :jnexus-core:build

      - name: Test jnexus-core
        run: gradle :jnexus-core:test

      - name: Build Android Debug APK
        run: gradle :jnexus-android:assembleDebug

      - name: Build Android Release APK
        run: gradle :jnexus-android:assembleRelease

      - name: Run Android Unit Tests
        run: gradle :jnexus-android:testDebugUnitTest

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: jnexus-android-debug
          path: jnexus-android/build/outputs/apk/debug/jnexus-android-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: jnexus-android-release
          path: jnexus-android/build/outputs/apk/release/jnexus-android-release-unsigned.apk
          retention-days: 90

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            jnexus-core/build/test-results/
            jnexus-android/build/test-results/
          retention-days: 30

name: Publish to Maven Central

on:
  release:
    types: [published]

jobs:
  publish-core:
    name: Publish nexus-java to Maven Central
    runs-on: ubuntu-latest
    if: "!github.event.release.prerelease"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Get release version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing nexus-java version: ${VERSION}"

      - name: Verify version in pom.xml
        run: |
          POM_VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | tr -d ' ')
          TAG_VERSION="${{ steps.version.outputs.version }}"
          echo "pom.xml version: ${POM_VERSION}"
          echo "Tag version: ${TAG_VERSION}"
          if [ "${POM_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::warning::pom.xml version (${POM_VERSION}) does not match tag (${TAG_VERSION}). Publishing with pom.xml version."
          fi

      - name: Publish nexus-java to Maven Central
        run: |
          mvn -B clean deploy \
            -P release \
            -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish summary
        if: always()
        run: |
          echo "## Maven Central Publishing" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact:** org.flossware:nexus-java:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Usage (Maven):**" >> $GITHUB_STEP_SUMMARY
          echo '```xml' >> $GITHUB_STEP_SUMMARY
          echo '<dependency>' >> $GITHUB_STEP_SUMMARY
          echo '    <groupId>org.flossware</groupId>' >> $GITHUB_STEP_SUMMARY
          echo '    <artifactId>nexus-java</artifactId>' >> $GITHUB_STEP_SUMMARY
          echo "    <version>${{ steps.version.outputs.version }}</version>" >> $GITHUB_STEP_SUMMARY
          echo '</dependency>' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Usage (Gradle):**" >> $GITHUB_STEP_SUMMARY
          echo '```gradle' >> $GITHUB_STEP_SUMMARY
          echo "implementation 'org.flossware:nexus-java:${{ steps.version.outputs.version }}'" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

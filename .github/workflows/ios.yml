name: iOS CI

on:
  push:
    branches: [ main ]
    paths:
      - 'jnexus-ios/**'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'jnexus-ios/**'
      - '.github/workflows/ios.yml'

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list devices available iPhone | tail -10

      - name: Resolve Swift package dependencies
        working-directory: jnexus-ios
        run: swift package resolve

      - name: Build with Swift Package Manager
        working-directory: jnexus-ios
        run: swift build

      - name: Run Swift package tests
        working-directory: jnexus-ios
        continue-on-error: true  # Tests are partially implemented (see issue #48)
        run: swift test

      - name: Build for macOS
        working-directory: jnexus-ios
        run: |
          xcodebuild build \
            -scheme JNexus \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Build for iOS Simulator
        working-directory: jnexus-ios
        run: |
          SIMULATOR=$(xcrun simctl list devices available iPhone | grep -oE 'iPhone [0-9]+' | tail -1)
          echo "Using simulator: ${SIMULATOR:-iPhone 16}"
          xcodebuild build \
            -scheme JNexus \
            -destination "platform=iOS Simulator,name=${SIMULATOR:-iPhone 16}" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests (macOS)
        working-directory: jnexus-ios
        continue-on-error: true  # Tests are partially implemented (see issue #48)
        run: |
          xcodebuild test \
            -scheme JNexus \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath build/test-results-macos.xcresult

      - name: Run tests (iOS Simulator)
        working-directory: jnexus-ios
        continue-on-error: true  # Tests are partially implemented (see issue #48)
        run: |
          SIMULATOR=$(xcrun simctl list devices available iPhone | grep -oE 'iPhone [0-9]+' | tail -1)
          echo "Using simulator: ${SIMULATOR:-iPhone 16}"
          xcodebuild test \
            -scheme JNexus \
            -destination "platform=iOS Simulator,name=${SIMULATOR:-iPhone 16}" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath build/test-results-ios.xcresult

      - name: Archive iOS App
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: jnexus-ios
        continue-on-error: true  # Archive may fail without full Xcode project setup
        run: |
          SIMULATOR=$(xcrun simctl list devices available iPhone | grep -oE 'iPhone [0-9]+' | tail -1)
          xcodebuild archive \
            -scheme JNexus \
            -destination "generic/platform=iOS Simulator" \
            -archivePath build/JNexus.xcarchive \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

      - name: Upload iOS Archive
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: jnexus-ios
          path: jnexus-ios/build/JNexus.xcarchive
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: |
            jnexus-ios/build/test-results-macos.xcresult
            jnexus-ios/build/test-results-ios.xcresult
          retention-days: 30
          if-no-files-found: ignore

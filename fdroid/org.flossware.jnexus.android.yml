Summary: Sonatype Nexus repository manager

Description: |-
  JNexus is a tool for managing components in Sonatype Nexus Repository Manager.

  Features:
  * List and search components with regex filtering
  * Advanced filters (size range, date range, file extension, name pattern)
  * Safe deletion with dry-run mode and confirmation prompts
  * Repository statistics and analytics (size distribution, file types, age)
  * Encrypted credential storage (AES-256-GCM)
  * Material Design 3 user interface
  * Profile-based configuration for multiple environments

Builds:
  - versionName: '2.0.0'
    versionCode: 3
    commit: v2.0.0
    subdir: jnexus-android
    sudo:
      - apt-get update
      - apt-get install -y openjdk-17-jdk-headless
    gradle:
      - yes
    prebuild:
      - sed -i -e '/signingConfigs/,/}$/d' -e '/signingConfig/d' build.gradle
    ndk: ''

AutoUpdateMode: Version
UpdateCheckMode: Tags
CurrentVersion: 2.0.0
CurrentVersionCode: 3

MaintainerNotes: |-
  The app requires no proprietary dependencies and builds reproducibly.
  jnexus-core is a pure Java 17 library dependency built as part of the
  Gradle multi-module project.
